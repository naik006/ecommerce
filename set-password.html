<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Set Password - Avail Fashions</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Avail Fashions</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h1>Set Password</h1>
            <p class="subtitle">Create a new password for your account</p>

            <form id="setPasswordForm">
                <div id="accountInfo" class="form-group"></div>

                <div class="form-group">
                    <label for="newPassword">New Password *</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="New password" required>
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword">Confirm Password *</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="btn-primary">Set Password</button>
            </form>

            <div class="signup-link" style="margin-top:12px;"><a href="login.html">← Back to Login</a></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/set-password.js"></script>
</body>
</html>
